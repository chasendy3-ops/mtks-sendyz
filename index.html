    <script>
        // ========== INISIALISASI FIREBASE ==========
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ========== KONFIGURASI BOT TELEGRAM (dari firebase-config.js) ==========
        // BOT_TOKEN, OWNER_ID, CHANNEL_ID, SESSION_KEY sudah tersedia

        // ========== CEK SESSION ==========
        let currentUser = null;
        let currentUserUID = null;
        let currentUserEmail = null;

        (function checkSession() {
            const session = sessionStorage.getItem(SESSION_KEY);
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const data = JSON.parse(session);
                if (!data.loggedIn || !data.username) {
                    window.location.href = 'login.html';
                    return;
                }
                currentUser = data.username;
                currentUserUID = data.uid || null;
                currentUserEmail = data.email || '';
                document.getElementById('userDisplay').textContent = currentUser;
            } catch(e) {
                window.location.href = 'login.html';
            }
        })();

        // ========== LOGOUT ==========
        function logoutMTKS() {
            if (confirm('Yakin ingin logout?')) {
                auth.signOut().then(() => {
                    sessionStorage.removeItem(SESSION_KEY);
                    window.location.href = 'login.html';
                }).catch(() => {
                    sessionStorage.removeItem(SESSION_KEY);
                    window.location.href = 'login.html';
                });
            }
        }

        // ========== KIRIM KE TELEGRAM (umum) ==========
        async function sendToTelegram(chatId, text, parseMode = 'Markdown') {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text,
                        parse_mode: parseMode
                    })
                });
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }

        // ========== KIRIM FOTO KE TELEGRAM ==========
        async function sendPhotoToTelegram(chatId, photoData, caption = '') {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', photoData);
                if (caption) formData.append('caption', caption);
                
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Telegram send photo error:', error);
                return false;
            }
        }

        // ========== KIRIM KE CHANNEL & BOT ==========
        async function sendToChannelAndBot(text) {
            const channelSuccess = await sendToTelegram(CHANNEL_ID, text);
            const botSuccess = await sendToTelegram(OWNER_ID, text);
            return channelSuccess && botSuccess;
        }

        // ========== KIRIM FOTO KE CHANNEL & BOT ==========
        async function sendPhotoToChannelAndBot(photoData, caption = '') {
            const channelSuccess = await sendPhotoToTelegram(CHANNEL_ID, photoData, caption);
            const botSuccess = await sendPhotoToTelegram(OWNER_ID, photoData, caption);
            return channelSuccess && botSuccess;
        }

        // ========== SISA KODE SAMA SEPERTI SEBELUMNYA ==========
        // ... Semua fungsi lainnya (kirimHasilIQKeChannel, loadProfile, quiz, calculator, dll) tetap sama ...
    </script>
